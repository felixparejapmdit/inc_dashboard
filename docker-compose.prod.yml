services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inc_backend_prod
    image: inc_backend_prod:latest
    env_file:
      - .env.docker
    environment:
      - PORT=5000
      - REACT_PORT_HTTPS=443
      - REDIS_HOST=redis
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
      - ./nginx/certs/cert.pem:/usr/src/app/cert.pem
      - ./nginx/certs/key.pem:/usr/src/app/key.pem
    expose:
      - "5000"
    networks:
      - inc_prod_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "incdirectory.pmdmc.net:172.18.100.103"
    depends_on:
      - redis
    restart: always

  directus:
    image: directus/directus:11
    container_name: inc_directus_prod
    env_file:
      - .env.docker
    environment:
      KEY: ${DIRECTUS_KEY:-replace-with-a-long-random-key}
      SECRET: ${DIRECTUS_SECRET:-replace-with-a-long-random-secret}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-change-this-password}
      DB_CLIENT: mysql
      DB_HOST: ${MYSQL_HOST}
      DB_PORT: ${MYSQL_PORT:-3306}
      DB_DATABASE: ${MYSQL_DATABASE:-ppi}
      DB_USER: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_PASSWORD:-}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-https://test-directus.pmdmc.net}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
    ports:
      - "8055:8055"
    networks:
      - inc_prod_network
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        ENV_FILE: .env.docker
    container_name: inc_frontend_prod
    command: sh -c "cp -r /app/build/* /frontend_build && tail -f /dev/null"
    volumes:
      - frontend_build:/frontend_build
    networks:
      - inc_prod_network
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: inc_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/usr/share/nginx/html
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    networks:
      - inc_prod_network
    restart: always

  redis:
    image: redis:alpine
    container_name: inc_redis_prod
    restart: always
    expose:
      - "6379"
    networks:
      - inc_prod_network

volumes:
  frontend_build:


networks:
  inc_prod_network:
    driver: bridge
